services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_backend
    restart: always
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me}
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/healthcheck', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gsysnet

  postgres:
    image: postgres:latest
    restart: always
    container_name: postgres_DB
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gsysnet

networks:
  gsysnet:
    driver: bridge

volumes:
  postgres:
    external: false
