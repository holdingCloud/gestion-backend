services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_backend
    restart: always
    environment:
      PORT: 3000
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me}
    ports:
      - 3000:3000
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gsysnet

  mysql:
    image: mysql:latest
    restart: always
    container_name: mysql_DB
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./mysql:/var/lib/mysql
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - gsysnet

networks:
  gsysnet:
    driver: bridge

volumes:
  mysql:
    external: false
